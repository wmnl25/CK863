<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CK863 Espresso Profiler</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { font-size: 1.5rem; margin-top: 0; }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .display-area { margin-top: 30px; }
        .weight { font-size: 3.5rem; font-weight: bold; color: #2c3e50; margin: 10px 0; }
        .details { font-size: 1.2rem; color: #7f8c8d; margin-bottom: 5px; }
        
        /* New Espresso UI Elements */
        .flow-rate { font-size: 1.5rem; font-weight: bold; color: #34495e; margin: 15px 0; }
        .advice { font-size: 1.1rem; font-weight: bold; padding: 10px; border-radius: 8px; margin-top: 10px; background: #f8f9fa; }
        
        .raw-data { 
            margin-top: 20px; 
            font-family: monospace; 
            font-size: 0.8rem; 
            background: #eee; 
            padding: 10px; 
            border-radius: 6px; 
            word-wrap: break-word;
        }
        .status { margin-top: 15px; font-size: 0.9rem; color: #27ae60; }
    </style>
</head>
<body>

<div class="card">
    <h1>CK863 Espresso Profiler</h1>
    <button id="connectBtn">Connect to Scale</button>
    <div id="status" class="status">Status: Disconnected</div>
    
    <div class="display-area">
        <div class="details" id="modeDisplay">Mode: Unknown</div>
        <div class="details" id="timerDisplay">Timer: 00:00</div>
        <div class="weight" id="weightDisplay">0.0 <span id="unitDisplay" style="font-size: 1.5rem;">g</span></div>
        
        <div class="flow-rate" id="flowDisplay" style="display: none;">Flow: 0.0 g/s</div>
        <div class="advice" id="adviceDisplay" style="display: none;">Waiting for flow...</div>
    </div>
    
    <div class="raw-data" id="rawDisplay">Raw Hex: --</div>
</div>

<script>
    const connectBtn = document.getElementById('connectBtn');
    const statusDiv = document.getElementById('status');
    const weightDisplay = document.getElementById('weightDisplay');
    const modeDisplay = document.getElementById('modeDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const rawDisplay = document.getElementById('rawDisplay');
    
    const flowDisplay = document.getElementById('flowDisplay');
    const adviceDisplay = document.getElementById('adviceDisplay');

    const SERVICE_UUID = 0xFFF0;
    const CHAR_NOTIFY_UUID = 0xFFF3;

    const unitMap = { 0x05: 'g', 0x08: 'ml', 0x0A: 'fl oz', 0x07: 'oz', 0x01: 'lb' };

    // Flow Calculation Variables
    let flowHistory = [];
    const FLOW_WINDOW_MS = 1500; // Look back 1.5 seconds to calculate smooth flow

    function calculateFlowRate(currentWeight) {
        const now = Date.now();
        flowHistory.push({ time: now, weight: parseFloat(currentWeight) });
        
        // Drop data points older than our window
        flowHistory = flowHistory.filter(item => (now - item.time) <= FLOW_WINDOW_MS);
        
        if (flowHistory.length < 2) return 0.0;
        
        const oldest = flowHistory[0];
        const newest = flowHistory[flowHistory.length - 1];
        
        const timeDiffSec = (newest.time - oldest.time) / 1000;
        if (timeDiffSec === 0) return 0.0;
        
        const weightDiff = newest.weight - oldest.weight;
        const flow = weightDiff / timeDiffSec;
        
        return Math.max(0, flow).toFixed(1); // Ignore negative flow if cup is removed
    }

    function updateEspressoAdvice(flowRate, totalWeight, totalSeconds) {
        flowDisplay.style.display = 'block';
        adviceDisplay.style.display = 'block';
        
        flowDisplay.innerText = `Flow: ${flowRate} g/s`;

        // Don't give advice during pre-infusion or when nothing is happening
        if (totalWeight < 2.0 || totalSeconds < 2) {
            adviceDisplay.innerText = "Waiting for steady flow...";
            adviceDisplay.style.color = "#7f8c8d";
            return;
        }

        // Generate Grinding Advice
        if (flowRate > 2.5) {
            adviceDisplay.innerText = "Flow is too fast. GRIND FINER. 🔽";
            adviceDisplay.style.color = "#e74c3c"; // Red
        } else if (flowRate > 0.5 && flowRate < 1.5 && totalSeconds > 8) {
            adviceDisplay.innerText = "Flow is too slow. GRIND COARSER. 🔼";
            adviceDisplay.style.color = "#e74c3c"; // Red
        } else if (flowRate >= 1.5 && flowRate <= 2.5) {
            adviceDisplay.innerText = "Optimal extraction flow rate! ☕";
            adviceDisplay.style.color = "#27ae60"; // Green
        } else if (flowRate == 0) {
            adviceDisplay.innerText = "Shot finished.";
            adviceDisplay.style.color = "#333";
        }
    }

    connectBtn.addEventListener('click', async () => {
        try {
            statusDiv.innerText = "Status: Requesting Bluetooth Device...";
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'CK863' }],
                optionalServices: [SERVICE_UUID]
            });

            device.addEventListener('gattserverdisconnected', () => {
                statusDiv.innerText = "Status: Disconnected";
                connectBtn.disabled = false;
            });

            statusDiv.innerText = "Status: Connecting...";
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(CHAR_NOTIFY_UUID);

            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', handleCharacteristicValueChanged);
            
            statusDiv.innerText = "Status: Connected & Listening";
            connectBtn.disabled = true;

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "Status: Error - " + error.message;
        }
    });

    function handleCharacteristicValueChanged(event) {
        const view = event.target.value;
        const length = view.byteLength;
        const header = view.getUint8(0);

        // --- Standard Weighing Mode ---
        if (header === 0x12 && length >= 8) {
            modeDisplay.innerText = "Mode: Standard";
            flowDisplay.style.display = 'none';
            adviceDisplay.style.display = 'none';
            
            const weightRaw = view.getInt16(4, true); 
            const weight = (weightRaw / 10.0).toFixed(1);
            const unit = unitMap[view.getUint8(6)] || 'unknown';

            weightDisplay.innerHTML = `${weight} <span style="font-size: 1.5rem;">${unit}</span>`;
            timerDisplay.innerText = "Timer: --:--";
            
            // Reset flow history when leaving espresso mode
            flowHistory = [];
        }
        
        // --- Espresso Mode ---
        else if (header === 0x14 && length >= 19) {
            modeDisplay.innerText = "Mode: Espresso";
            
            const unit = unitMap[view.getUint8(4)] || 'unknown';
            const min = view.getUint8(6);
            const sec = view.getUint8(7);
            const totalSeconds = (min * 60) + sec;
            
            const weightRaw = view.getInt16(11, true);
            const weight = (weightRaw / 10.0).toFixed(1);

            weightDisplay.innerHTML = `${weight} <span style="font-size: 1.5rem;">${unit}</span>`;
            timerDisplay.innerText = `Timer: ${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;

            // Calculate Flow Rate and Display Advice
            const currentFlowRate = calculateFlowRate(weight);
            updateEspressoAdvice(currentFlowRate, parseFloat(weight), totalSeconds);
        }
    }
</script>
</body>
</html>
